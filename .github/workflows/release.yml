name: Release

# Push a version tag (e.g. v0.3.1) and GitHub builds the Windows installer
# and publishes it to a Release automatically.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # allows the workflow to create the GitHub Release

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      # Build only — electron-builder's own GitHub uploader silently dropped
      # large assets twice (v0.2.2, v0.3.0), so publishing is handled below.
      - run: npm run dist
      - name: Stage assets with updater-exact names
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          mkdir -p upload
          cp "release/Onyx Setup ${V}.exe" "upload/Onyx-Setup-${V}.exe"
          cp "release/Onyx Setup ${V}.exe.blockmap" "upload/Onyx-Setup-${V}.exe.blockmap"
          cp release/latest.yml upload/latest.yml
          ls -la upload
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*
      - name: Verify release is complete
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 10
          NAMES="$(gh release view "$GITHUB_REF_NAME" --json assets -q '.assets[].name')"
          echo "assets on $GITHUB_REF_NAME:"
          echo "$NAMES"
          echo "$NAMES" | grep -qx "Onyx-Setup-${GITHUB_REF_NAME#v}.exe" || { echo "::error::installer missing from release"; exit 1; }
          echo "$NAMES" | grep -qx "latest.yml" || { echo "::error::latest.yml missing from release"; exit 1; }
